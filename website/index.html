<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Defuddle Portal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900">Defuddle Portal</h1>
            <p class="text-slate-500 mt-2">支持自定义输出格式的网页解析引擎</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass p-8 rounded-3xl shadow-xl space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">输出格式</label>
                        <select id="formatSelect" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                            <option value="markdown">Markdown (纯文本)</option>
                            <option value="json">JSON (完整数据对象)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">目标 URL</label>
                        <div class="flex gap-2">
                            <input type="url" id="urlInput" placeholder="https://..." class="flex-1 px-4 py-2 rounded-xl border border-slate-200 outline-none">
                            <button onclick="run('url')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all">抓取</button>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-3xl shadow-xl">
                    <label class="block text-sm font-bold text-slate-700 mb-2">手动粘贴 HTML 源码</label>
                    <textarea id="htmlInput" rows="10" class="w-full px-4 py-2 rounded-xl border border-slate-200 font-mono text-xs outline-none focus:ring-2 focus:ring-indigo-500" placeholder="在此粘贴源码..."></textarea>
                    <button onclick="run('html')" class="mt-4 w-full border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-xl hover:bg-indigo-600 hover:text-white transition-all">转换本地源码</button>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl shadow-xl flex flex-col relative min-h-[500px]">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">输出预览</h3>
                    <button onclick="copyContent()" class="text-xs bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full font-bold">复制结果</button>
                </div>
                <textarea id="resultArea" readonly class="flex-1 w-full p-4 bg-slate-50/50 rounded-2xl font-mono text-sm text-slate-700 outline-none resize-none"></textarea>
                
                <div id="loader" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center rounded-3xl z-10">
                    <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function run(mode) {
            const url = document.getElementById('urlInput').value.trim();
            const html = document.getElementById('htmlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const resultArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');

            if (mode === 'url' && !url) return alert('请输入 URL');
            if (mode === 'html' && !html) return alert('请提供 HTML');

            loader.classList.remove('hidden');
            resultArea.value = "处理中...";

            try {
                let finalContent = "";
                if (mode === 'url') {
                    // GET 请求带上 format 参数
                    const response = await fetch(`/api/md?url=${encodeURIComponent(url)}&format=${format}`);
                    const contentType = response.headers.get("content-type");
                    
                    if (contentType && contentType.includes("application/json")) {
                        const json = await response.json();
                        finalContent = JSON.stringify(json, null, 2);
                    } else {
                        finalContent = await response.text();
                    }
                } else {
                    // POST 请求带上 format 参数
                    const response = await fetch(`/api/md`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ html, url, format })
                    });
                    
                    if (format === 'json') {
                        const json = await response.json();
                        finalContent = JSON.stringify(json, null, 2);
                    } else {
                        finalContent = await response.text();
                        // 尝试处理可能的 JSON 包装（根据后端实现）
                        try {
                            const possibleJson = JSON.parse(finalContent);
                            finalContent = possibleJson.data?.markdown || possibleJson.markdown || finalContent;
                        } catch(e) {}
                    }
                }
                resultArea.value = finalContent;
            } catch (err) {
                resultArea.value = "请求失败: " + err.message;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyContent() {
            const text = document.getElementById('resultArea').value;
            if(!text || text.startsWith('处理中')) return;
            navigator.clipboard.writeText(text);
            alert('已复制');
        }
    </script>
</body>
</html>
