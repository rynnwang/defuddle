<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Defuddle Portal - CIO Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900 font-sans">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-indigo-950 tracking-tighter">Defuddle Portal</h1>
            <p class="text-slate-400 mt-2 text-xs font-bold uppercase tracking-[0.2em]">Deep Cleaning & Pure Content Only</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass p-8 rounded-[2rem] shadow-2xl space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Output Configuration</label>
                        <select id="formatSelect" class="w-full px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 font-bold bg-white/50">
                            <option value="markdown">Markdown (纯文本)</option>
                            <option value="json">JSON (包含元数据)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Remote Page URL</label>
                        <div class="flex gap-2">
                            <input type="url" id="urlInput" placeholder="粘贴网页链接..." class="flex-1 px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 bg-white/50">
                            <button onclick="run('url')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black hover:bg-indigo-700 shadow-lg transition-all">抓取</button>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2rem] shadow-2xl">
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Manual Source</label>
                    <textarea id="htmlInput" rows="10" class="w-full px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 font-mono text-[10px] focus:ring-2 focus:ring-indigo-600 bg-white/50" placeholder="粘贴 HTML 源码..."></textarea>
                    <button onclick="run('html')" class="mt-4 w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-black transition-all shadow-md">本地转换</button>
                </div>
            </div>

            <div class="glass p-8 rounded-[2rem] shadow-2xl flex flex-col relative min-h-[600px] border-2 border-white">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Preview Output</h3>
                    <button onclick="copyContent()" class="bg-indigo-50 text-indigo-700 px-5 py-2 rounded-full font-black text-[10px] hover:bg-indigo-100 transition-all">复制</button>
                </div>
                <textarea id="resultArea" readonly class="flex-1 w-full p-4 bg-transparent font-mono text-sm text-slate-600 outline-none resize-none leading-relaxed" placeholder="解析出的 Markdown 将在此处显示..."></textarea>
                
                <div id="loader" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center rounded-[2rem] z-10">
                    <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 font-black text-indigo-600 text-[10px] uppercase">Cleaning Content...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function run(mode) {
            const url = document.getElementById('urlInput').value.trim();
            const html = document.getElementById('htmlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const resultArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');

            if (mode === 'url' && !url) return alert('请输入 URL');
            if (mode === 'html' && !html) return alert('请输入源码');

            loader.classList.remove('hidden');
            resultArea.value = "Starting Clean Engine...";

            try {
                let finalContent = "";
                if (mode === 'url') {
                    const response = await fetch(`/api/md?url=${encodeURIComponent(url)}&format=${format}`);
                    if (format === 'json') {
                        const json = await response.json();
                        finalContent = JSON.stringify(json, null, 2);
                    } else {
                        finalContent = await response.text();
                    }
                } else {
                    const response = await fetch(`/api/md`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ html, url, format })
                    });
                    
                    if (format === 'json') {
                        const json = await response.json();
                        finalContent = JSON.stringify(json, null, 2);
                    } else {
                        const text = await response.text();
                        try {
                            const possibleJson = JSON.parse(text);
                            finalContent = possibleJson.data?.markdown || possibleJson.markdown || text;
                        } catch(e) {
                            finalContent = text;
                        }
                    }
                }
                resultArea.value = finalContent;
            } catch (err) {
                resultArea.value = "ERROR: " + err.message;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyContent() {
            const val = document.getElementById('resultArea').value;
            if(!val || val.includes('Starting Clean')) return;
            navigator.clipboard.writeText(val);
            alert('Copied!');
        }
    </script>
</body>
</html>
