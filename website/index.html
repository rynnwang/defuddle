<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Defuddle Portal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-indigo-900">Defuddle Portal</h1>
            <p class="text-slate-500 mt-2 font-medium">支持深度标签清洗的网页解析引擎</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass p-8 rounded-3xl shadow-2xl space-y-5">
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 mb-2">输出格式控制</label>
                        <select id="formatSelect" class="w-full px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 bg-white/50 font-bold">
                            <option value="markdown">Markdown (纯文本)</option>
                            <option value="json">JSON (包含元数据)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 mb-2">目标 URL</label>
                        <div class="flex gap-2">
                            <input type="url" id="urlInput" placeholder="粘贴链接..." class="flex-1 px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 bg-white/50">
                            <button onclick="run('url')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black hover:bg-indigo-700 shadow-lg transition-all">抓取</button>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-3xl shadow-2xl">
                    <label class="block text-xs font-black uppercase text-slate-400 mb-2">手动 HTML 源码</label>
                    <textarea id="htmlInput" rows="10" class="w-full px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 font-mono text-xs focus:ring-2 focus:ring-indigo-500 bg-white/50" placeholder="如果自动抓取失败，请手动粘贴源码..."></textarea>
                    <button onclick="run('html')" class="mt-4 w-full bg-white border-2 border-indigo-600 text-indigo-600 font-black py-4 rounded-xl hover:bg-indigo-600 hover:text-white transition-all shadow-md">转换本地源码</button>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl shadow-2xl flex flex-col relative min-h-[600px] border border-white">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-800 uppercase text-sm">Output Preview</h3>
                    <button onclick="copyContent()" class="bg-indigo-50 text-indigo-600 px-5 py-2 rounded-full font-black text-xs hover:bg-indigo-100 transition-all">复制结果</button>
                </div>
                <textarea id="resultArea" readonly class="flex-1 w-full p-6 bg-slate-50/30 rounded-2xl font-mono text-sm text-slate-700 outline-none resize-none leading-relaxed border-none ring-1 ring-slate-100"></textarea>
                
                <div id="loader" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center rounded-3xl z-10">
                    <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 font-black text-indigo-600 text-sm">正在深度清洗并解析...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function run(mode) {
            const url = document.getElementById('urlInput').value.trim();
            const html = document.getElementById('htmlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const resultArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');

            if (mode === 'url' && !url) return alert('请输入 URL');
            if (mode === 'html' && !html) return alert('请提供 HTML 内容');

            loader.classList.remove('hidden');
            resultArea.value = "Starting engine...";

            try {
                let finalContent = "";
                if (mode === 'url') {
                    const response = await fetch(`/api/md?url=${encodeURIComponent(url)}&format=${format}`);
                    if (format === 'json') {
                        const json = await response.json();
                        finalContent = JSON.stringify(json, null, 2);
                    } else {
                        finalContent = await response.text();
                    }
                } else {
                    const response = await fetch(`/api/md`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ html, url, format })
                    });
                    
                    if (format === 'json') {
                        const json = await response.json();
                        finalContent = JSON.stringify(json, null, 2);
                    } else {
                        // 即使是 POST，我们也尝试智能解析返回的内容
                        const text = await response.text();
                        try {
                            const possibleJson = JSON.parse(text);
                            finalContent = possibleJson.data?.markdown || possibleJson.markdown || text;
                        } catch(e) {
                            finalContent = text;
                        }
                    }
                }
                resultArea.value = finalContent;
            } catch (err) {
                resultArea.value = "CRITICAL ERROR: " + err.message;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyContent() {
            const text = document.getElementById('resultArea').value;
            if(!text || text.includes('Starting engine')) return;
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }
    </script>
</body>
</html>
