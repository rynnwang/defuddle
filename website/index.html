<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defuddle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-5xl mx-auto px-6 py-12">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">Defuddle Portal</h1>
            <p class="mt-3 text-lg text-slate-500">CIO 专属的高效网页 Markdown 转化引擎</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass p-6 rounded-3xl shadow-xl">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">目标网页 URL</label>
                    <div class="flex gap-2">
                        <input type="url" id="urlInput" placeholder="https://example.com/article" 
                               class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <button onclick="runConvert('url')" id="btnUrl" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">抓取</button>
                    </div>
                </div>

                <div id="manualPanel" class="glass p-6 rounded-3xl shadow-xl border-2 border-transparent transition-all">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-sm font-semibold text-slate-700">手动粘贴 HTML 源码</label>
                        <span id="errorBadge" class="hidden bg-red-100 text-red-600 text-[10px] px-2 py-1 rounded-md font-bold uppercase">反爬拦截</span>
                    </div>
                    <textarea id="htmlInput" rows="12" placeholder="如果自动抓取失败，请在此粘贴源码..." 
                              class="w-full px-4 py-3 rounded-xl border border-slate-200 font-mono text-xs focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                    <button onclick="runConvert('html')" id="btnHtml" class="mt-4 w-full border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-xl hover:bg-indigo-600 hover:text-white transition-all">转换本地源码</button>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl shadow-xl flex flex-col min-h-[500px] relative">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-slate-800">Markdown 预览</h3>
                    <button onclick="copyMd()" class="text-xs bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full font-bold hover:bg-indigo-100 transition-all">一键拷贝</button>
                </div>
                <textarea id="resultArea" readonly class="flex-1 w-full p-4 bg-slate-50/50 rounded-2xl font-mono text-sm text-slate-600 border-none outline-none resize-none"></textarea>
                
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/60 flex flex-col items-center justify-center rounded-3xl z-20">
                    <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-sm font-bold text-indigo-600">正在处理...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runConvert(type) {
            const url = document.getElementById('urlInput').value.trim();
            const html = document.getElementById('htmlInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            const overlay = document.getElementById('loadingOverlay');
            const badge = document.getElementById('errorBadge');
            const manualPanel = document.getElementById('manualPanel');

            if (type === 'url' && !url) return alert('请输入 URL');
            if (type === 'html' && !html) return alert('请先输入 HTML 源码');

            overlay.classList.remove('hidden');
            badge.classList.add('hidden');
            manualPanel.classList.remove('border-red-200', 'bg-red-50');

            try {
                let response;
                if (type === 'url') {
                    // 使用你要求的 GET 方式
                    response = await fetch(`/api/md?url=${encodeURIComponent(url)}`);
                } else {
                    // 使用传统的 POST 方式
                    response = await fetch(`/api/md`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ html, url })
                    });
                }

                const resData = await response.json();

                if (resData.success) {
                    // 根据你 md.ts 的返回结构提取 markdown
                    resultArea.value = resData.data.markdown || resData.data;
                } else if (resData.error === 'AUTH_BLOCKED') {
                    badge.classList.remove('hidden');
                    manualPanel.classList.add('border-red-200', 'bg-red-50');
                    resultArea.value = `请求被拦截 (HTTP ${resData.status})\n\n该目标网站禁止了自动抓取。请按照以下步骤操作：\n1. 在浏览器中打开 URL\n2. 检查源代码 (Ctrl+U) 并全选复制\n3. 粘贴到左侧区域后点击“转换本地源码”按钮。`;
                } else {
                    resultArea.value = `错误: ${resData.message || '解析失败'}`;
                }
            } catch (err) {
                resultArea.value = `连接 API 失败: ${err.message}`;
            } finally {
                overlay.classList.add('hidden');
            }
        }

        function copyMd() {
            const content = document.getElementById('resultArea').value;
            if(!content) return;
            navigator.clipboard.writeText(content);
            alert('Markdown 已复制到剪贴板');
        }
    </script>
</body>
</html>
