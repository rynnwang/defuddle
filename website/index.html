<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defuddle - 网页解析工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-indigo-600 mb-2">Defuddle API Demo</h1>
            <p class="text-slate-500">将杂乱的 HTML 瞬间转化为纯净的 Markdown</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div class="p-6 rounded-2xl shadow-sm glass-morphism">
                    <label class="block text-sm font-medium text-slate-700 mb-2">原始 URL (可选)</label>
                    <input type="url" id="originUrl" placeholder="https://example.com" 
                           class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
                </div>
                
                <div class="p-6 rounded-2xl shadow-sm glass-morphism">
                    <label class="block text-sm font-medium text-slate-700 mb-2">HTML 内容</label>
                    <textarea id="htmlInput" rows="15" placeholder="在此粘贴你的 HTML 代码..."
                              class="w-full px-4 py-2 rounded-lg border border-slate-200 font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    
                    <button onclick="handleConvert()" id="btnText"
                            class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <span>立即转换</span>
                    </button>
                </div>
            </div>

            <div class="p-6 rounded-2xl shadow-sm glass-morphism relative">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-medium text-slate-700">Markdown 结果</label>
                    <button onclick="copyToClipboard()" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">复制内容</button>
                </div>
                <textarea id="mdOutput" readonly rows="20"
                          class="w-full px-4 py-2 rounded-lg bg-slate-100 border-none font-mono text-sm text-slate-700 outline-none"></textarea>
                
                <div id="loader" class="hidden absolute inset-0 bg-white/50 flex items-center justify-center rounded-2xl">
                    <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function handleConvert() {
            const html = document.getElementById('htmlInput').value;
            const url = document.getElementById('originUrl').value;
            const btn = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const output = document.getElementById('mdOutput');

            if (!html) return alert('请输入内容');

            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch('/api/md', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ html, url })
                });

                const data = await response.json();
                
                if (data.markdown) {
                    output.value = data.markdown;
                } else {
                    output.value = '转换失败: ' + (data.error || '未知错误');
                }
            } catch (err) {
                output.value = '请求出错: ' + err.message;
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('mdOutput').value;
            navigator.clipboard.writeText(text);
            alert('已复制到剪贴板');
        }
    </script>
</body>
</html>
