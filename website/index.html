<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Defuddle Portal Pro - Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-indigo-950">Defuddle Portal</h1>
            <p class="text-slate-400 mt-2 font-bold uppercase tracking-widest text-xs">Deep Sanitization & Pure Markdown Output</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="glass p-8 rounded-[2rem] shadow-2xl border-white border-2">
                    <div class="mb-6">
                        <label class="block text-xs font-black text-slate-400 mb-2 uppercase">Output Format</label>
                        <select id="formatSelect" class="w-full px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 font-bold bg-white">
                            <option value="markdown">Markdown (纯文本)</option>
                            <option value="json">JSON (完整数据对象)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-black text-slate-400 mb-2 uppercase">Remote URL</label>
                        <div class="flex gap-2">
                            <input type="url" id="urlInput" placeholder="粘贴网页链接..." class="flex-1 px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 font-medium">
                            <button onclick="run('url')" id="btnUrl" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black hover:bg-indigo-700 shadow-lg active:scale-95 transition-all">抓取</button>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2rem] shadow-2xl">
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase">Manual HTML Source</label>
                    <textarea id="htmlInput" rows="12" class="w-full px-4 py-3 rounded-xl border-none ring-1 ring-slate-200 font-mono text-[10px] focus:ring-2 focus:ring-indigo-600 outline-none" placeholder="如果自动抓取被屏蔽，请在此粘贴源码..."></textarea>
                    <button onclick="run('html')" id="btnHtml" class="mt-4 w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-black transition-all">转换本地源码</button>
                </div>
            </div>

            <div class="glass p-8 rounded-[2rem] shadow-2xl flex flex-col min-h-[600px] relative border-2 border-indigo-50">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-800 uppercase text-xs tracking-tighter">Preview Output</h3>
                    <button onclick="copyContent()" class="bg-indigo-100 text-indigo-700 px-5 py-2 rounded-full font-black text-[10px] hover:bg-indigo-200">复制</button>
                </div>
                <textarea id="resultArea" readonly class="flex-1 w-full p-6 bg-transparent font-mono text-sm text-slate-600 outline-none resize-none leading-relaxed" placeholder="结果将在这里实时生成..."></textarea>
                
                <div id="loader" class="hidden absolute inset-0 bg-white/80 flex flex-col items-center justify-center rounded-[2rem] z-10">
                    <div class="w-10 h-10 border-[5px] border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 font-black text-indigo-950 text-xs uppercase" id="loadText">Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function run(mode) {
            const url = document.getElementById('urlInput').value.trim();
            const html = document.getElementById('htmlInput').value.trim();
            const format = document.getElementById('formatSelect').value;
            const resultArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');
            const loadText = document.getElementById('loadText');

            if (mode === 'url' && !url) return alert('请输入 URL');
            if (mode === 'html' && !html) return alert('请粘贴源码');

            loader.classList.remove('hidden');
            loadText.innerText = mode === 'url' ? "Fetching & Cleaning..." : "Converting Local Source...";
            resultArea.value = "";

            try {
                const api = mode === 'url' ? `/api/md?url=${encodeURIComponent(url)}&format=${format}` : `/api/md`;
                const options = mode === 'url' ? {} : {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ html, url, format })
                };

                const response = await fetch(api, options);
                const contentType = response.headers.get("content-type");
                
                if (contentType && contentType.includes("application/json")) {
                    const res = await response.json();
                    if (format === 'json') {
                        resultArea.value = JSON.stringify(res, null, 2);
                    } else {
                        // 即使后端返回了 JSON，我们也智能提取其中的 markdown 字段
                        const data = res.data || res;
                        resultArea.value = data.markdown || data.content || JSON.stringify(data, null, 2);
                    }
                } else {
                    // 直接处理纯文本返回
                    resultArea.value = await response.text();
                }
            } catch (err) {
                resultArea.value = "FATAL ERROR: " + err.message;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyContent() {
            const val = document.getElementById('resultArea').value;
            if(!val) return;
            navigator.clipboard.writeText(val);
            alert('Copied!');
        }
    </script>
</body>
</html>
